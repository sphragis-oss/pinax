name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run check:generic
      - run: npm run verify:criteria
      - run: node scripts/validate-profile.mjs profiles/sre/profile.json
      - run: node scripts/validate-profile.mjs profiles/helm/profile.json
      - run: node scripts/validate-profile.mjs profiles/reading/profile.json
