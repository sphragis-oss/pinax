name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run verify:criteria
      - name: Check tag matches manifest version
        run: |
          set -euo pipefail
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${MANIFEST_VERSION}" ]; then
            echo "tag ${GITHUB_REF_NAME} != manifest version ${MANIFEST_VERSION}" >&2
            exit 1
          fi
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            versions.json
      - name: Create release with plugin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "pinax ${GITHUB_REF_NAME}" \
            --generate-notes \
            main.js manifest.json styles.css versions.json
