name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run verify:criteria
      - name: Check tag matches manifest version
        run: |
          set -euo pipefail
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${MANIFEST_VERSION}" ]; then
            echo "tag ${GITHUB_REF_NAME} != manifest version ${MANIFEST_VERSION}" >&2
            exit 1
          fi
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            versions.json
      - name: Compose release notes from CHANGELOG
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          awk -v ver="$VERSION" '$0 ~ "^## \\[" ver "\\]" {on=1; next} on && /^## \[/ {exit} on {print}' CHANGELOG.md > relnotes.md
          PREV_TAG="$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || true)"
          {
            echo "## Commits"
            if [ -n "$PREV_TAG" ]; then
              git log --format='* %h %s' "${PREV_TAG}..${VERSION}"
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${VERSION}"
            else
              git log --format='* %h %s' "${VERSION}"
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/commits/${VERSION}"
            fi
            echo
            echo "## Verify this build"
            echo '```bash'
            echo "gh attestation verify main.js --repo ${GITHUB_REPOSITORY}"
            echo '```'
          } >> relnotes.md
      - name: Create release with plugin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "pinax ${GITHUB_REF_NAME}" \
            --notes-file relnotes.md \
            main.js manifest.json styles.css versions.json
